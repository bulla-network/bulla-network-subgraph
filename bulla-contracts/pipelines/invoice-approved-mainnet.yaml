name: invoice-approved-mainnet
apiVersion: 1
sources:
  - type: subgraph
    name: invoice_approved_source
    namespace: bulla-contracts-mainnet
    version: v2-main
sinks:
  - type: webhook
    name: invoice_approved_webhook
    from: invoice_approved_source
    description: Streams InvoiceApprovedEvent entities to a webhook
    collections:
      - invoice_approved_event
    config:
      url: ${INVOICE_APPROVED_WEBHOOK_URL}
